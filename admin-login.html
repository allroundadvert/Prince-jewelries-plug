<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | PRINCE JEWELRIES PLUG</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#000;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:#111;
padding:30px;
border:2px solid gold;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 0 20px gold;
}

.login-box h1{
color:gold;
margin-bottom:25px;
}

input{
width:90%;
padding:15px;
margin:10px 0;
border:2px solid gold;
border-radius:8px;
font-size:16px;
}

button{
background:gold;
color:black;
padding:15px 30px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#d4af37;
}
</style>

</head>

<body>

<div class="login-box">

<h1>👑 PRINCE JEWELRIES PLUG</h1>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>
function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username==="PrinceAdmin" && password==="Prince123"){

window.location.href="admin-dashboard.html";

}else{

alert("Incorrect Username or Password");

}

}
</script>

</body>
</html>
