<body>

<section style="padding:20px;text-align:center;">

>

<div id="productContainer"></div>


</section>





<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import { getDatabase, ref, onValue, push, set } 
from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";



const firebaseConfig = {


apiKey: "AIzaSyB1gRwZo8hFRmKl4jNXlyngLWZrCWvQAh0",


authDomain: "prince-jewelries-plug.firebaseapp.com",


databaseURL: "https://prince-jewelries-plug-default-rtdb.firebaseio.com",


projectId: "prince-jewelries-plug",


storageBucket: "prince-jewelries-plug.firebasestorage.app",


messagingSenderId: "412766918362",


appId: "1:412766918362:web:c7413e8c1c6664c06db7e3"


};



const app = initializeApp(firebaseConfig);


const db = getDatabase(app);


const container = document.getElementById("productContainer");



onValue(ref(db,"products"), snap => {


container.innerHTML = "";



snap.forEach(item=>{


const p = item.val();



container.innerHTML += `


<div class="product">


<img src="${p.image}" style="width:100%;max-width:300px;border-radius:10px;">


<h3>${p.name}</h3>


<p>Product Code: ${p.code}</p>


<h2>₦${p.price}</h2>


<p>${p.description || ""}</p>


<input class="customerName" placeholder="Full Name">


<input class="customerPhone" placeholder="Phone Number">


<input class="customerEmail" placeholder="Email">


<textarea class="customerAddress" placeholder="Delivery Address"></textarea>


<input class="quantity" type="number" value="1">


<button class="shop-btn"

onclick="buyNow('${p.name}','${p.code}','${p.price}',this)">

🛒 Order Now

</button>


</div>


`;


});


});


</script>
<script>


async function shareProduct(image,name,code,price){


try{


const response = await fetch(image);


const blob = await response.blob();


const file = new File([blob],"product.jpg",{type:blob.type});


await navigator.share({


title:name,


text:`👑 PRINCE JEWELRIES PLUG

💎 Product: ${name}

🏷 Product Code: ${code}

💰 Price: ₦${price}

🛒 Buy Online:
https://allroundadvert.github.io/Prince-jewelries-plug/shop.html`,


files:[file]


});


}

catch(err){

console.log(err);

}


}







function buyNow(name,code,price,btn){


let card = btn.parentElement;



let customerName =
card.querySelector(".customerName").value;


let customerPhone =
card.querySelector(".customerPhone").value;


let customerEmail =
card.querySelector(".customerEmail").value;


let customerAddress =
card.querySelector(".customerAddress").value;


let quantity =
card.querySelector(".quantity").value;



if(!customerName || !customerPhone || !customerAddress){


alert("Please fill your details");


return;


}



const orderRef = push(ref(db,"orders"));



set(orderRef,{


customerName:customerName,


customerPhone:customerPhone,


customerEmail:customerEmail,


customerAddress:customerAddress,


product:name,


productCode:code,


price:price,


quantity:quantity,


status:"Pending",


date:new Date().toLocaleString()


});



alert("Order received successfully");



window.location.href =

"https://wa.me/2348145891674?text="

+encodeURIComponent(


"New Order\n\n"+

"Customer: "+customerName+

"\nPhone: "+customerPhone+

"\nProduct: "+name+

"\nCode: "+code+

"\nQuantity: "+quantity+

"\nAddress: "+customerAddress


);



}



</script>
