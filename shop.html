<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRINCE JEWELRIES PLUG | Luxury Jewelry Store</title>

<meta name="theme-color" content="#d4af37">

<link rel="stylesheet" href="style.css">

<script src="https://js.paystack.co/v1/inline.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:#fff;
}

header{
background:#000;
border-bottom:2px solid gold;
position:sticky;
top:0;
z-index:999;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo h1{
color:gold;
font-size:30px;
}

.logo p{
color:#ddd;
margin-top:5px;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:gold;
}

.whatsapp-btn{
background:#25D366;
color:white;
padding:12px 22px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
}

.hero{
padding:70px 20px;
text-align:center;
background:linear-gradient(135deg,#000,#222);
}

.hero h1{
font-size:48px;
color:gold;
margin-bottom:15px;
}

.hero p{
font-size:18px;
max-width:700px;
margin:auto;
color:#ddd;
}

.hero button{
margin-top:25px;
padding:15px 35px;
border:none;
background:gold;
color:#000;
font-weight:bold;
border-radius:30px;
cursor:pointer;
font-size:18px;
}

#productContainer{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
padding:30px;
}

.product{
background:#111;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,215,0,.15);
transition:.3s;
}

.product:hover{
transform:translateY(-6px);
}

.product img{
width:100%;
height:320px;
object-fit:cover;
border-radius:12px;
}

.shop-btn{
background:gold;
color:#000;
padding:15px;
width:100%;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}

.share-btn{
background:#1877F2;
color:white;
padding:12px;
width:100%;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #555;
font-size:15px;
}

footer{
background:#000;
padding:35px;
text-align:center;
margin-top:40px;
border-top:2px solid gold;
}

</style>

</head>
