<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | PRINCE JEWELRIES PLUG</title>

<link rel="stylesheet" href="style.css">
<script src="https://js.paystack.co/v1/inline.js"></script>

</head>

<body>

<header>

<div class="logo">
<h1>👑 PRINCE JEWELRIES PLUG</h1>
<p>Luxury • Class • Elegance</p>
</div>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
</ul>
</nav>

<a href="https://wa.me/2348145891674" class="whatsapp-btn">
Order on WhatsApp
</a>

</header>

<a href="https://www.facebook.com/share/1EeEqVkLaw/"
target="_blank"
style="display:inline-block;background:#1877F2;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:10px;">
📘 Follow us on Facebook
</a>

<section style="padding:20px;text-align:center;">

<input
type="text"
placeholder="🔍 Search for jewelry..."
style="width:90%;max-width:500px;padding:15px;font-size:18px;border:2px solid gold;border-radius:30px;outline:none;">

</section>

<section style="padding:40px;">

<h2 style="color:gold;text-align:center;">
Our Collection
</h2>

<div id="productContainer"></div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyB1gRwZo8hFRmKl4jNXlyngLWZrCWvQAh0",
 authDomain: "prince-jewelries-plug.firebaseapp.com",
 databaseURL: "https://prince-jewelries-plug-default-rtdb.firebaseio.com",
 projectId: "prince-jewelries-plug",
 storageBucket: "prince-jewelries-plug.firebasestorage.app",
 messagingSenderId: "412766918362",
 appId: "1:412766918362:web:c7413e8c1c6664c06db7e3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const container = document.getElementById("productContainer");

onValue(ref(db,"products"), snap => {

container.innerHTML="";

snap.forEach(item=>{

const p=item.val();

container.innerHTML += `

<div class="product">

<img src="${p.image}" style="width:100%;max-width:300px;border-radius:10px;">

<h3>${p.name}</h3>

<p><strong>Product Code:</strong> ${p.code}</p>

<h2>₦${p.price}</h2>

<p>${p.description||""}</p>

<a class="shop-btn"
href="https://wa.me/2348145891674?text=Hello%20PRINCE%20JEWELRIES%20PLUG,%20I%20want%20to%20order%20${encodeURIComponent(p.name)}.%20Product%20Code:%20${encodeURIComponent(p.code)}">
Order on WhatsApp
</a>

<button class="shop-btn"
onclick="shareProduct('${p.image}','${p.name}','${p.code}','${p.price}')">
📤 Share
</button>
<h3>Delivery Details</h3>

<input type="text" id="customerName" placeholder="Full Name" required>

<input type="tel" id="customerPhone" placeholder="Phone Number" required>

<input type="email" id="customerEmail" placeholder="Email (Optional)">

<textarea id="customerAddress" placeholder="Delivery Address" rows="3" required></textarea>

<input type="number" id="quantity" value="1" min="1">

<button onclick="buyNow()">
🛒 Buy & Pay
</button>
<button class="shop-btn"
style="background:#16a34a;color:white;"
onclick="payWithPaystack('${p.name}','${p.price}')">
💳 Buy Now
</button>

</div>

`;

});

});

</script>

<script>

async function shareProduct(image,name,code,price){

try{

const response=await fetch(image);

const blob=await response.blob();

const file=new File([blob],"product.jpg",{type:blob.type});

await navigator.share({

title:name,

text:`👑 PRINCE JEWELRIES PLUG

💎 Product: ${name}
🏷 Product Code: ${code}
💰 Price: ₦${price}

🛒 Buy Online:
https://allroundadvert.github.io/Prince-jewelries-plug/shop.html

📲 To order, tap the WhatsApp button on our website.`,
files:[file]

});

}catch(err){

console.log(err);

}

}

function payWithPaystack(name, price){

const customerName =
document.getElementById("customerName").value;

const customerPhone =
document.getElementById("customerPhone").value;

const customerEmail =
document.getElementById("customerEmail").value;

const customerAddress =
document.getElementById("customerAddress").value;

const quantity =
document.getElementById("quantity").value;

if(!customerName || !customerPhone || !customerAddress){

alert("Please fill your Name, Phone Number and Delivery Address.");

return;

}

let handler = PaystackPop.setup({

key:"pk_live_33b331a205d88d45cf78059c0b009354f7d1fb17",

email: customerEmail || "customer@email.com",

amount:Number(price)*100,

currency:"NGN",

ref:"PJP"+Math.floor((Math.random()*1000000000)+1),

metadata:{

custom_fields:[

{
display_name:"Customer Name",
variable_name:"customer_name",
value:customerName
},

{
display_name:"Phone Number",
variable_name:"phone",
value:customerPhone
},

{
display_name:"Delivery Address",
variable_name:"address",
value:customerAddress
},

{
display_name:"Quantity",
variable_name:"quantity",
value:quantity
},

{
display_name:"Product",
variable_name:"product",
value:name
}

]

},

callback:function(response){

alert("Payment Successful!\nReference: "+response.reference);

window.location.href =
"https://wa.me/2348145891674?text="
+encodeURIComponent(
"Payment Successful\n\n"
+"Customer: "+customerName+"\n"
+"Phone: "+customerPhone+"\n"
+"Address: "+customerAddress+"\n"
+"Quantity: "+quantity+"\n"
+"Product: "+name+"\n"
+"Amount: ₦"+price+"\n"
+"Reference: "+response.reference
);

},

onClose:function(){

alert("Payment Cancelled");

}

});

handler.openIframe();

}
}

</script>

</body>
</html>
