<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Orders | Prince Jewelries & Perfumes</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111;
color:#fff;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:gold;
}

.order{
background:#222;
border:1px solid gold;
padding:15px;
margin:15px 0;
border-radius:10px;
}

.order h3{
color:gold;
margin:0 0 10px;
}

.order p{
margin:5px 0;
}

.deleteBtn{
background:red;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Customer Orders</h1>

<div id="orders"></div>
  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB1gRwZo8hFRmKl4jNXlyngLWZrCWvQAh0",
authDomain: "prince-jewelries-plug.firebaseapp.com",
databaseURL: "https://prince-jewelries-plug-default-rtdb.firebaseio.com",
projectId: "prince-jewelries-plug",
storageBucket: "prince-jewelries-plug.firebasestorage.app",
messagingSenderId: "412766918362",
appId: "1:412766918362:web:c7413e8c1c6664c06db7e3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const orders=document.getElementById("orders");
    onValue(ref(db,"orders"),snapshot=>{

orders.innerHTML="";

snapshot.forEach(item=>{

const o=item.val();

orders.innerHTML+=`

<div class="order">

<h3>${o.product}</h3>

<p><b>Customer:</b> ${o.customerName}</p>

<p><b>Phone:</b> ${o.customerPhone}</p>

<p><b>Email:</b> ${o.customerEmail||"Not provided"}</p>

<p><b>Address:</b> ${o.customerAddress}</p>

<p><b>Quantity:</b> ${o.quantity}</p>

<p><b>Amount:</b> ₦${o.price}</p>

<p><b>Date:</b> ${o.date}</p>

<button class="deleteBtn"
onclick="deleteOrder('${item.key}')">
Delete Order
</button>

</div>

`;

});

});

window.deleteOrder=function(id){

if(confirm("Delete this order?")){

remove(ref(db,"orders/"+id));

}

}

</script>

</body>
</html>
