<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | PRINCE JEWELRIES PLUG</title>

<style>
body{
background:#000;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
color:white;
}
.container{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border:2px solid gold;
border-radius:15px;
}
h1,h2{
color:gold;
text-align:center;
}
input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:2px solid gold;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}
button{
background:gold;
color:black;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
.deleteBtn{
background:red;
color:white;
width:auto;
padding:8px 15px;
}
.productCard{
border:1px solid gold;
padding:15px;
margin-top:15px;
border-radius:10px;
}
.productCard img{
width:120px;
height:120px;
object-fit:cover;
border-radius:8px;
}
#message{
text-align:center;
color:gold;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 Manage Products</h1>

<label>Product Image URL</label>
<input type="text" id="imageUrl">

<label>Product Name</label>
<input type="text" id="productName">

<label>Product Code</label>
<input type="text" id="productCode" readonly>

<label>Category</label>
<select id="category">
<option>Jewelry Set</option>
<option>Necklace</option>
<option>Ring</option>
<option>Bracelet</option>
<option>Watch</option>
<option>Earrings</option>
<option>Perfume</option>
<option>Body Spray</option>
<option>Phone</option>
<option>Phone Accessories</option>
<option>Smart Watch</option>
<option>AirPods</option>
<option>Power Bank</option>
<option>Bluetooth Speaker</option>
<option>Headphones</option>
<option>Charger</option>
<option>USB Cable</option>
</select>

<label>Price</label>
<input type="text" id="price">

<label>Description</label>
<textarea id="description"></textarea>

<button id="addProduct">Add Product</button>

<p id="message"></p>

<hr>

<h2>Products</h2>

<div id="productList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
remove
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB1gRwZo8hFRmKl4jNXlyngLWZrCWvQAh0",
authDomain: "prince-jewelries-plug.firebaseapp.com",
databaseURL: "https://prince-jewelries-plug-default-rtdb.firebaseio.com",
projectId: "prince-jewelries-plug",
storageBucket: "prince-jewelries-plug.firebasestorage.app",
messagingSenderId: "412766918362",
appId: "1:412766918362:web:c7413e8c1c6664c06db7e3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let productNumber = Math.floor(Math.random()*9000)+1000;
document.getElementById("productCode").value="PJP-"+productNumber;

const addBtn=document.getElementById("addProduct");

addBtn.addEventListener("click",async()=>{

const image=document.getElementById("imageUrl").value;
const name=document.getElementById("productName").value;
const code=document.getElementById("productCode").value;
const category=document.getElementById("category").value;
const price=document.getElementById("price").value;
const description=document.getElementById("description").value;

if(!image||!name||!price){
document.getElementById("message").innerHTML="Please fill image, name and price";
return;
}

const productRef=push(ref(db,"products"));

await set(productRef,{
image,
name,
code,
category,
price,
description,
date:new Date().toLocaleString()
});

document.getElementById("message").innerHTML="✅ Product Added Successfully";

document.getElementById("imageUrl").value="";
document.getElementById("productName").value="";
document.getElementById("price").value="";
document.getElementById("description").value="";

productNumber=Math.floor(Math.random()*9000)+1000;
document.getElementById("productCode").value="PJP-"+productNumber;

});

const list=document.getElementById("productList");

onValue(ref(db,"products"),snapshot=>{

list.innerHTML="";

snapshot.forEach(item=>{

const p=item.val();

list.innerHTML+=`
<div class="productCard">

<img src="${p.image}">

<h3>${p.name}</h3>

<p><b>Code:</b> ${p.code}</p>

<p><b>Price:</b> ₦${p.price}</p>
<button onclick="editProduct('${item.key}')">
✏️ Edit
</button>

<button class="deleteBtn" onclick="deleteProduct('${item.key}')">
🗑 Delete Product
</button>

</div>
`;

});

});
window.editProduct=function(id){

const productRef=ref(db,"products/"+id);

onValue(productRef,(snap)=>{

const p=snap.val();

document.getElementById("imageUrl").value=p.image;
document.getElementById("productName").value=p.name;
document.getElementById("productCode").value=p.code;
document.getElementById("category").value=p.category;
document.getElementById("price").value=p.price;
document.getElementById("description").value=p.description;

const btn=document.getElementById("addProduct");

btn.innerHTML="💾 Save Changes";

btn.onclick=async function(){

await set(productRef,{
image:document.getElementById("imageUrl").value,
name:document.getElementById("productName").value,
code:document.getElementById("productCode").value,
category:document.getElementById("category").value,
price:document.getElementById("price").value,
description:document.getElementById("description").value,
date:new Date().toLocaleString()
});

alert("✅ Product Updated Successfully");
location.reload();

};

},{onlyOnce:true});

  }
window.deleteProduct=function(id){

if(confirm("Delete this product?")){

remove(ref(db,"products/"+id));

}

}

</script>

</body>
</html>
