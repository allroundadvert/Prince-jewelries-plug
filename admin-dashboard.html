<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | PRINCE JEWELRIES PLUG</title>

<style>
body{
background:#000;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
color:white;
}

.container{
max-width:900px;
margin:auto;
background:#111;
padding:20px;
border:2px solid gold;
border-radius:15px;
}

h1{
color:gold;
text-align:center;
}

input, select, textarea{
width:100%;
padding:12px;
margin:10px 0;
border:2px solid gold;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
background:gold;
color:black;
padding:15px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{
background:#d4af37;
}

#message{
text-align:center;
color:gold;
margin-top:15px;
}
</style>

</head>

<body>

<div class="container">

<h1>👑 Manage Products</h1>

<label>Product Image URL</label>
<input type="text" id="imageUrl" placeholder="Paste image link here">

<label>Product Name</label>
<input type="text" id="productName" placeholder="Enter product name">

<label>Product Code</label>
<input type="text" id="productCode" readonly>

<label>Category</label>
<select id="category">
<option>Jewelry Set</option>
<option>Necklace</option>
<option>Ring</option>
<option>Bracelet</option>
<option>Watch</option>
<option>Earrings</option>
</select>

<label>Price</label>
<input type="text" id="price" placeholder="₦150,000">

<label>Description</label>
<textarea id="description" rows="5" placeholder="Product description"></textarea>

<button id="addProduct">Add Product</button>

<p id="message"></p>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import { 
getDatabase,
ref,
push,
set
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyB1gRwZo8hFRmKl4jNXlyngLWZrCWvQAh0",
authDomain: "prince-jewelries-plug.firebaseapp.com",
projectId: "prince-jewelries-plug",
storageBucket: "prince-jewelries-plug.firebasestorage.app",
messagingSenderId: "412766918362",
appId: "1:412766918362:web:c7413e8c1c6664c06db7e3",
measurementId: "G-F87S5ZK6E9"
};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


// Generate product code automatically

let productNumber = Math.floor(Math.random() * 9000) + 1000;

document.getElementById("productCode").value = 
"PJP-" + productNumber;



// Save product to Firebase

document.getElementById("addProduct").addEventListener("click", async ()=>{


const imageUrl = document.getElementById("imageUrl").value;
const productName = document.getElementById("productName").value;
const productCode = document.getElementById("productCode").value;
const category = document.getElementById("category").value;
const price = document.getElementById("price").value;
const description = document.getElementById("description").value;


if(!imageUrl || !productName || !price){

document.getElementById("message").innerHTML =
"Please fill image, name and price";

return;

}



const productRef = push(ref(db,"products"));


await set(productRef,{

image:imageUrl,
name:productName,
code:productCode,
category:category,
price:price,
description:description,
date:new Date().toLocaleString()

});


document.getElementById("message").innerHTML =
"✅ Product Added Successfully";


document.getElementById("imageUrl").value="";
document.getElementById("productName").value="";
document.getElementById("price").value="";
document.getElementById("description").value="";


});


</script>

</body>
</html>
